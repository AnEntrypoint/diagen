name: Quantize Qwen2.5-0.5B Abliterated for Browser

on:
  workflow_dispatch:
    inputs:
      hf_model:
        description: 'Abliterated model for tokenizer/config'
        default: 'huihui-ai/Qwen2.5-0.5B-Instruct-abliterated'
        required: true
      onnx_model:
        description: 'ONNX source model (pre-quantized q4f16)'
        default: 'onnx-community/Qwen2.5-0.5B-Instruct'
        required: true

permissions:
  contents: write

jobs:
  quantize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip transformers huggingface_hub

      - name: Download abliterated model (tokenizer + config only)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_HF_MODEL: ${{ inputs.hf_model }}
        run: |
          python -c "
          import os; from huggingface_hub import snapshot_download
          snapshot_download(repo_id=os.environ['INPUT_HF_MODEL'], local_dir='./src_model',
            token=os.environ.get('HF_TOKEN') or None,
            ignore_patterns=['*.safetensors','*.bin','*.pt','*.gguf','*.msgpack','*.h5','flax_model*','tf_model*'])
          print('Config files:', os.listdir('./src_model'))
          "

      - name: Download pre-built q4f16 ONNX
        env:
          INPUT_ONNX_MODEL: ${{ inputs.onnx_model }}
        run: |
          python -c "
          import os; from huggingface_hub import hf_hub_download
          os.makedirs('./onnx_q4f16', exist_ok=True)
          fname = hf_hub_download(repo_id=os.environ['INPUT_ONNX_MODEL'],
            filename='onnx/model_q4f16.onnx', local_dir='./onnx_dl')
          import shutil; shutil.copy(fname, './onnx_q4f16/model_q4f16.onnx')
          print('ONNX size:', os.path.getsize('./onnx_q4f16/model_q4f16.onnx'), 'bytes')
          "

      - name: Copy config files from abliterated model
        run: |
          python -c "
          import os, shutil
          dst = 'gh-pages-src/demo/model'
          skip = {'.gitattributes', 'LICENSE', 'README.md', 'eval.sh'}
          for f in os.listdir('./src_model'):
            if os.path.isfile(f'./src_model/{f}') and f not in skip:
              shutil.copy2(f'./src_model/{f}', f'{dst}/{f}'); print('Copied:', f)
          "

      - name: Split ONNX and write manifest
        run: |
          python -c "
          import os, json; CHUNK=99*1024*1024; out='gh-pages-src/demo/model/onnx'
          os.makedirs(out, exist_ok=True); manifest={}
          for fname in os.listdir('./onnx_q4f16'):
            if not fname.endswith('.onnx'): continue
            parts=[]
            with open(f'./onnx_q4f16/{fname}','rb') as fh:
              i=0
              while True:
                c=fh.read(CHUNK)
                if not c: break
                n=f'{fname}.part{i}'; open(f'{out}/{n}','wb').write(c); parts.append(n); i+=1
            manifest[fname]=parts; print(fname,len(parts),'parts')
          json.dump(manifest,open(f'{out}/manifest.json','w'),indent=2); print('manifest written')
          "

      - name: Update worker.js
        run: |
          cat > /tmp/update_worker.py << 'PYEOF'
          import os, json, re

          manifest = json.load(open('gh-pages-src/demo/model/onnx/manifest.json'))
          chunks = {}
          for fname, parts in manifest.items():
            stem = re.sub(r'\.onnx$', '', fname)
            sizes = [os.path.getsize(f'gh-pages-src/demo/model/onnx/{p}') for p in parts]
            quantized_key = re.sub(r'\.onnx$', '_quantized.onnx', fname)
            chunks[quantized_key] = {'stem': stem, 'sizes': sizes}

          cjs = 'const CHUNKS = {\n'
          for k, v in chunks.items():
            sz = ', '.join(str(s) for s in v['sizes'])
            cjs += f"  '{k}': {{\n    stem: '{v['stem']}',\n    sizes: [{sz}]\n  }},\n"
          cjs += '}'

          w = open('gh-pages-src/demo/worker.js').read()
          w = re.sub(r'const CHUNKS = \{[\s\S]*?\}(?=\s*\n)', cjs, w)
          w = re.sub(r"import \{[^}]+\} from './transformers\.min\.js\?v=\d+'",
            "import { AutoModelForCausalLM, AutoProcessor, TextStreamer, env } from './transformers.min.js?v=54'", w)
          w = re.sub(r"const VISION_ENCODER_STUB = '[^']*'\n", '', w)
          w = re.sub(r"  if \(url\.endsWith\('vision_encoder_quantized\.onnx'\)\) \{[\s\S]*?  \}\n", '', w)
          w = re.sub(r'const DTYPE = \{[^}]+\}', "const DTYPE = { decoder_model_merged: 'q4f16' }", w)
          w = re.sub(r'async function tryLoadModel\(device, progress\) \{[\s\S]*?^\}',
            "async function tryLoadModel(device, progress) {\n  return AutoModelForCausalLM.from_pretrained(MODEL_ID, {\n    dtype: DTYPE, device, progress_callback: progress,\n    model_file_name: 'model_q4f16'\n  })\n}",
            w, flags=re.MULTILINE)
          total = sum(sum(v['sizes']) for v in chunks.values())
          w = re.sub(r'const DECODER_ONNX_MIN_SIZE = [\d\s\*]+', f'const DECODER_ONNX_MIN_SIZE = {int(total * 0.7)}', w)
          w = re.sub('decoder_model_merged_q4f16\.onnx', 'model_q4f16.onnx', w)
          open('gh-pages-src/demo/worker.js', 'w').write(w)
          print('worker.js updated')
          import re as re2
          app = open('gh-pages-src/demo/app.js').read()
          app = re2.sub(r"worker\.js\?v=\d+", "worker.js?v=54", app)
          open('gh-pages-src/demo/app.js', 'w').write(app)
          print('app.js updated')
          PYEOF
          python /tmp/update_worker.py

      - name: Remove stray gitattributes from model dir
        run: rm -f gh-pages-src/demo/model/.gitattributes

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 600
          git add gh-pages-src/demo/model/ gh-pages-src/demo/worker.js gh-pages-src/demo/app.js
          git diff --cached --stat
          git commit -m "quantize: Qwen2.5-0.5B q4f16 ONNX (onnx-community), abliterated config"
          git push
