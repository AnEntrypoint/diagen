name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy voices and generate manifest
        run: |
          mkdir -p gh-pages-src/demo/voices
          if [ -d voices ]; then
            cp voices/*.wav gh-pages-src/demo/voices/ 2>/dev/null || true
          fi
          ls gh-pages-src/demo/voices/*.wav 2>/dev/null | xargs -I{} basename {} | \
            jq -Rs '[split("\n")[] | select(length>0)]' > gh-pages-src/demo/voices/manifest.json
          cat gh-pages-src/demo/voices/manifest.json

      - name: Download and bundle Chatterbox Turbo ONNX model
        run: |
          pip install -q huggingface_hub
          python3 - <<'PYEOF'
          import os, math
          from huggingface_hub import snapshot_download

          dest = 'gh-pages-src/demo/model/chatterbox'
          snapshot_download(
            repo_id='ResembleAI/chatterbox-turbo-ONNX',
            local_dir=os.path.join(dest, 'ResembleAI/chatterbox-turbo-ONNX'),
            ignore_patterns=['*.msgpack', '*.h5', 'flax_model*', 'tf_model*', 'rust_model*'],
          )

          CHUNK = 99 * 1024 * 1024
          CHUNKED = {
            'onnx/conditional_decoder.onnx_data',
            'onnx/language_model.onnx_data',
            'onnx/speech_encoder.onnx_data',
          }
          model_dir = os.path.join(dest, 'ResembleAI/chatterbox-turbo-ONNX')
          manifest = []
          for rel in CHUNKED:
            src = os.path.join(model_dir, rel)
            if not os.path.exists(src):
              raise FileNotFoundError(f'Expected model file missing: {src}')
            size = os.path.getsize(src)
            n = math.ceil(size / CHUNK)
            with open(src, 'rb') as f:
              for i in range(n):
                data = f.read(CHUNK)
                part_path = f'{src}.part{i}'
                with open(part_path, 'wb') as pf:
                  pf.write(data)
            os.remove(src)
            manifest.append({'file': rel, 'parts': n, 'size': size})
            print(f'chunked {rel}: {size} bytes → {n} parts')
          import json
          with open(os.path.join(model_dir, 'chunks.json'), 'w') as f:
            json.dump(manifest, f)
          print('chunks.json written:', manifest)
          PYEOF

      - name: Deploy landing page to gh-pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 600
          cp -r gh-pages-src /tmp/gh-pages-publish
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          cp -r /tmp/gh-pages-publish/. .
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: ${{ github.sha }}"
          git push origin gh-pages
