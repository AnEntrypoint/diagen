name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy voices and generate manifest
        run: |
          mkdir -p gh-pages-src/demo/voices
          if [ -d voices ]; then
            cp voices/*.wav gh-pages-src/demo/voices/ 2>/dev/null || true
            cp voices/*.embedding.bin gh-pages-src/demo/voices/ 2>/dev/null || true
            cp voices/*.embedding.json gh-pages-src/demo/voices/ 2>/dev/null || true
          fi
          ls gh-pages-src/demo/voices/*.wav 2>/dev/null | xargs -I{} basename {} | \
            jq -Rs '[split("\n")[] | select(length>0)]' > gh-pages-src/demo/voices/manifest.json
          cat gh-pages-src/demo/voices/manifest.json

      - name: Deploy landing page to gh-pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          cp -r gh-pages-src /tmp/gh-pages-publish
          # Publish a clean orphan commit containing only gh-pages-src contents.
          # No model payload — streamtts hosts the chunked ONNX on its own models branch,
          # and the browser worker pulls chunks directly from raw.githubusercontent.
          cd /tmp/gh-pages-publish
          git init -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' -c user.email='github-actions[bot]@users.noreply.github.com' commit -q -m "deploy: ${{ github.sha }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
