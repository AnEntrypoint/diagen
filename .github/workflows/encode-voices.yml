name: Encode speaker embeddings

on:
  push:
    branches: [main]
    paths:
      - 'voices/*.wav'
      - 'tools/encode-speakers.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install transformers.js (encoder-only, isolated from project deps)
        run: |
          mkdir -p .ci-encoder
          cd .ci-encoder
          echo '{"name":"diagen-encoder","type":"module","dependencies":{"@huggingface/transformers":"^4.2.0"}}' > package.json
          bun install
          cd ..
          ln -sf .ci-encoder/node_modules node_modules
          ls -la node_modules/@huggingface/

      - name: Run encoder
        run: bun run tools/encode-speakers.mjs

      - name: Commit embeddings
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add voices/*.embedding.bin voices/*.embedding.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(voices): regenerate speaker embeddings [skip ci]"
            git push
          else
            echo 'no embedding changes'
          fi
