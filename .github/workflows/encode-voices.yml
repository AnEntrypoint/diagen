name: Encode speaker embeddings

on:
  push:
    branches: [main]
    paths:
      - 'voices/*.wav'
      - 'tools/encode-speakers.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run encoder
        run: bun run tools/encode-speakers.mjs

      - name: Commit embeddings
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add voices/*.embedding.bin voices/*.embedding.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(voices): regenerate speaker embeddings [skip ci]"
            git push
          else
            echo 'no embedding changes'
          fi
