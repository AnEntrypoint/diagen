name: Encode Custom Voices for Pocket TTS

on:
  push:
    paths:
      - 'gh-pages-src/demo/voices/*.wav'
      - 'encode_voices.py'
      - '.github/workflows/encode-voices.yml'
  workflow_dispatch:

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pocket-tts dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pocket-tts-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-pocket-tts-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchaudio safetensors sphn
          pip install git+https://github.com/kyutai-labs/pocket-tts.git

      - name: Inspect pocket-tts package
        run: |
          python -c "
          import pocket_tts, inspect
          from pocket_tts.models.tts_model import TTSModel, RECOMMENDED_CONFIG, PREDEFINED_VOICES, init_states, export_model_state, get_flow_lm_state_dict
          print('RECOMMENDED_CONFIG:', RECOMMENDED_CONFIG)
          print('PREDEFINED_VOICES:', PREDEFINED_VOICES)
          print('TTSModel init sig:', inspect.signature(TTSModel.__init__))
          print('init_states sig:', inspect.signature(init_states))
          print('export_model_state sig:', inspect.signature(export_model_state))
          print('get_flow_lm_state_dict sig:', inspect.signature(get_flow_lm_state_dict))
          "

      - name: Encode voices
        run: python encode_voices.py

      - name: Check for generated files
        run: ls -lh gh-pages-src/demo/voices/*.safetensors || echo "No safetensors files generated"

      - name: Commit encoded voices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet gh-pages-src/demo/voices/; then
            echo "No changes to commit"
          else
            git add gh-pages-src/demo/voices/*.safetensors
            git commit -m "Encode custom voices for pocket-tts" || echo "Nothing to commit"
            git push || echo "Could not push (no changes)"
          fi
