name: Encode Custom Voices for Pocket TTS

on:
  push:
    paths:
      - 'gh-pages-src/demo/voices/*.wav'
      - '.github/workflows/encode-voices.yml'
      - 'ci/encode-voices/**'
  workflow_dispatch:

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/xn/target
          key: ${{ runner.os }}-cargo-encode-voices-v4

      - name: Clone xn-repo
        run: |
          rm -rf /tmp/xn
          git clone --depth 1 https://github.com/LaurentMazare/xn.git /tmp/xn
          mkdir -p /tmp/xn/encode-voices/src
          cp ${{ github.workspace }}/ci/encode-voices/Cargo.toml /tmp/xn/encode-voices/Cargo.toml
          cp ${{ github.workspace }}/ci/encode-voices/src/main.rs /tmp/xn/encode-voices/src/main.rs
          sed -i 's|members = \[|members = [\n  "encode-voices",|' /tmp/xn/Cargo.toml

      - name: Build encode-voices
        working-directory: /tmp/xn
        run: cargo build --release -p encode-voices

      - name: Encode voices
        working-directory: ${{ github.workspace }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: /tmp/xn/target/release/encode-voices

      - name: List generated files
        run: ls -lh gh-pages-src/demo/voices/

      - name: Commit encoded voices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet gh-pages-src/demo/voices/; then
            echo "No changes to commit"
          else
            git add gh-pages-src/demo/voices/*.safetensors
            git commit -m "Encode custom voices for pocket-tts" || echo "Nothing to commit"
            git push || echo "Could not push (no changes)"
          fi
