name: Encode Custom Voices for Pocket TTS

on:
  push:
    paths:
      - 'gh-pages-src/demo/voices/*.wav'
      - '.github/workflows/encode-voices.yml'
  workflow_dispatch:

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download TTS models
        run: node download-models.js

      - name: Encode voices
        run: node ci/encode-voices/encode.js

      - name: List generated files
        run: ls -lh gh-pages-src/demo/voices/

      - name: Commit encoded voices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet gh-pages-src/demo/voices/; then
            echo "No changes to commit"
          else
            git add gh-pages-src/demo/voices/*.safetensors
            git commit -m "Encode custom voices for pocket-tts" || echo "Nothing to commit"
            git push || echo "Could not push (no changes)"
          fi
