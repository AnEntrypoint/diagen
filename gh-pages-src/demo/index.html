<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#247420" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#3A9A34" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <title>diagen / voice chat</title>
  <script>window.coi = { coepCredentialless: () => true }</script>
  <script src="./coi-serviceworker.js"></script>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script type="module">
    import { installStyles } from 'https://unpkg.com/anentrypoint-design@latest/dist/247420.js';
    installStyles();
    document.documentElement.classList.add('ds-247420');
  </script>
  <style>
    .stage {
      max-width: 760px; margin: 0 auto;
      padding: 24px 32px 64px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .page-title { font-family: var(--ff-display); font-size: clamp(32px, 6vw, 48px); line-height: 1; letter-spacing: -0.02em; font-weight: 700; margin: 0 0 4px; color: var(--panel-text); }
    .page-title .accent { color: var(--panel-accent); }
    .subline { font-family: var(--ff-mono); font-size: 11px; color: var(--panel-text-2); text-transform: uppercase; letter-spacing: 0.08em; }

    #progress-wrap { background: var(--panel-1); border-radius: 8px; overflow: hidden; box-shadow: var(--panel-shadow); }
    #progress-text {
      font-family: var(--ff-mono); font-size: 11px;
      padding: 8px 12px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--panel-text-2);
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    }
    #progress-text::before { content: "// loading"; color: var(--panel-accent); }
    #progress-track { height: 2px; background: var(--panel-2); }
    #progress-bar { height: 2px; width: 0%; background: var(--panel-accent); transition: width 0.3s; }

    #vrm-canvas {
      width: 100%; height: 340px; display: block;
      border-radius: 8px;
      background: var(--panel-1);
      box-shadow: var(--panel-shadow);
    }

    #voice-wrap {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px;
      background: var(--panel-1); border-radius: 6px; box-shadow: var(--panel-shadow);
    }
    #voice-wrap label { font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--panel-text-2); }
    #voice-select {
      flex: 1; background: transparent; color: var(--panel-text);
      font-family: var(--ff-mono); font-size: 12px;
      padding: 4px 0; cursor: pointer;
    }

    #character-wrap { display: flex; flex-direction: column; gap: 8px; }
    #character-wrap > label {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--ff-mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--panel-text-2);
    }
    #character-wrap > label::before { content: "// npc"; color: var(--panel-accent); }

    #sheet-mic-btn, #card-load-btn {
      font-family: var(--ff-mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      background: var(--panel-2); color: var(--panel-text);
      border-radius: 4px;
      padding: 2px 8px; cursor: pointer;
      transition: background 80ms ease;
    }
    #sheet-mic-btn { width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    #sheet-mic-btn:hover, #card-load-btn:hover { background: var(--panel-3); }
    #sheet-mic-btn.recording { background: var(--warn); color: var(--paper); }

    #character-sheet {
      width: 100%; background: var(--panel-1); color: var(--panel-text);
      border-radius: 6px;
      font-family: var(--ff-mono); font-size: 12px;
      padding: 12px; resize: vertical; min-height: 84px; max-height: 200px;
      transition: box-shadow 80ms ease;
      box-shadow: var(--panel-shadow);
    }
    #character-sheet:focus { box-shadow: 0 0 0 2px var(--panel-accent); }

    #persona-btn {
      font-family: var(--ff-mono); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--panel-text); color: var(--panel-0);
      border-radius: 6px;
      box-shadow: 4px 4px 0 var(--panel-3);
      padding: 10px 16px; cursor: pointer;
      transition: transform 80ms ease, box-shadow 80ms ease;
    }
    #persona-btn:not(:disabled):hover { transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--panel-3); }
    #persona-btn:not(:disabled):active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--panel-3); }
    #persona-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    #chat {
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px;
      background: var(--panel-1); border-radius: 8px;
      box-shadow: var(--panel-shadow);
      min-height: 160px; max-height: 40dvh; overflow-y: auto;
    }
    #chat:empty::before {
      content: "// no messages yet. press the mic.";
      font-family: var(--ff-mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--panel-text-2);
    }
    .bubble {
      font-family: var(--ff-mono); font-size: 12px;
      line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      padding: 12px; max-width: 90%;
      border-radius: 6px;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--panel-accent); color: var(--panel-accent-fg);
    }
    .bubble.user::before {
      display: block; content: "// you"; font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      opacity: .7; margin-bottom: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--panel-2); color: var(--panel-text);
    }
    .bubble.assistant::before {
      display: block; content: "// npc"; font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--mascot); margin-bottom: 4px;
    }

    #controls {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 24px 0 32px;
      box-shadow: 0 -1px 0 var(--panel-2);
    }
    #speak-btn {
      width: 88px; height: 88px; border-radius: 9999px;
      background: var(--panel-text); color: var(--panel-0);
      box-shadow: 6px 6px 0 var(--panel-3);
      font-size: 32px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 80ms ease, box-shadow 80ms ease, background 80ms ease;
    }
    #speak-btn:not(:disabled):hover { transform: translate(1px,1px); box-shadow: 5px 5px 0 var(--panel-3); }
    #speak-btn:not(:disabled):active { transform: translate(6px,6px); box-shadow: 0 0 0 var(--panel-3); }
    #speak-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    #speak-btn.recording { background: var(--warn); color: var(--paper); animation: rec 1s infinite; }
    @keyframes rec { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }

    #status {
      font-family: var(--ff-mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--panel-text-2); min-height: 1.2em; text-align: center;
    }
  </style>
</head>
<body>
<div class="app">

  <header class="app-topbar">
    <span class="brand">diagen<span class="slash"> / </span>247420</span>
    <nav>
      <a href="../">← back</a>
      <a href="https://github.com/AnEntrypoint/diagen">source ↗</a>
    </nav>
  </header>

  <div class="app-crumb">
    <span>diagen</span><span class="sep">›</span>
    <span class="leaf">demo</span>
  </div>

  <div class="app-body no-side">
    <main class="app-main" style="padding:0; max-width:none;">

      <div class="stage">

        <div>
          <h1 class="page-title"><span class="accent">//</span> voice chat</h1>
          <div class="subline">in-browser · chatterbox turbo · vrm mouth · zero server</div>
        </div>

        <div id="progress-wrap">
          <div id="progress-text">initializing…</div>
          <div id="progress-track"><div id="progress-bar"></div></div>
        </div>

        <canvas id="vrm-canvas"></canvas>

        <div id="voice-wrap" hidden>
          <label for="voice-select">voice</label>
          <select id="voice-select"></select>
        </div>

        <div id="character-wrap">
          <label for="character-sheet">
            npc identity
            <button id="sheet-mic-btn" title="describe changes by voice">🎤</button>
            <button id="card-load-btn" title="load sillytavern character card (.json)">load card</button>
            <input type="file" id="card-file" accept=".json" hidden>
          </label>
          <textarea id="character-sheet" placeholder="describe who this npc is — name, role in the world, personality, how they speak. they are a character in a game, not an ai."></textarea>
          <button id="persona-btn" disabled>lock in character</button>
        </div>

        <div id="chat"></div>

        <div id="controls">
          <button id="speak-btn" disabled title="press to speak">🎤</button>
          <div id="status">loading model…</div>
        </div>

      </div>

    </main>
  </div>

  <footer class="app-status">
    <span class="item">demo</span>
    <span class="spread"></span>
    <span class="item">247420 / mmxxvi</span>
    <span class="item">· probably emerging</span>
  </footer>

</div>

<script type="module" src="./app.js?v=6"></script>
</body>
</html>
