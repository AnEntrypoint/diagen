<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagen - VRM Talking Avatar</title>
  <script type="module">
    import { installStyles } from 'https://unpkg.com/anentrypoint-design@latest/dist/247420.js';
    installStyles();
    document.documentElement.classList.add('ds-247420');
  </script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #container { display: grid; grid-template-columns: 1fr 340px; height: 100vh; background: var(--panel-0); }
    #viewer { position: relative; background: #000; }
    #viewer canvas { width: 100%; height: 100%; display: block; }
    #sidebar { background: var(--panel-1); border-left: 1px solid var(--panel-2); padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; color: var(--panel-text); }
    #sidebar h1 { font-family: var(--ff-display); font-size: 22px; margin: 0; color: var(--panel-text); }
    #sidebar .subtitle { font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--panel-text-2); }
    #sidebar .section { background: var(--panel-0); border: 1px solid var(--panel-2); border-radius: 8px; padding: 12px; }
    #sidebar .section-title { font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--panel-text-2); margin-bottom: 8px; }
    #sidebar textarea, #sidebar input[type="text"], #sidebar select { width: 100%; }
    #sidebar textarea { min-height: 80px; resize: vertical; }
    .controls { display: flex; gap: 8px; }
    .controls button { flex: 1; }
    #status { padding: 8px 10px; border-radius: 6px; font-size: 12px; background: var(--panel-2); color: var(--panel-text-2); }
    #status.loading { color: var(--green); }
    #status.error { color: var(--warn); }
    #status.ready { color: var(--live); }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--green-2); font-family: var(--ff-mono); font-size: 12px; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--green-2); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #llm-status, #timing { font-family: var(--ff-mono); font-size: 11px; color: var(--panel-text-3); margin-top: 6px; min-height: 14px; }
    #sidebar .footnote { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--panel-2); font-family: var(--ff-mono); font-size: 11px; color: var(--panel-text-3); line-height: 1.6; }
  </style>
</head>
<body>
  <div id="container">
    <div id="viewer">
      <div id="loading">
        <div class="spinner"></div>
        <div>Loading VRM...</div>
      </div>
    </div>
    <div id="sidebar">
      <div>
        <h1>diagen</h1>
        <div class="subtitle">// text-to-speech + facial animation</div>
      </div>
      <div class="section">
        <div class="section-title">// ask ai</div>
        <input type="text" class="input input-block" id="prompt-input" placeholder="Ask something...">
        <button class="btn btn-primary btn-block" id="ask-btn" disabled style="margin-top:8px;">Ask AI</button>
        <div id="llm-status"></div>
      </div>
      <div class="section">
        <div class="section-title">// text to speak</div>
        <textarea class="textarea textarea-block" id="text-input" placeholder="Type something for Cleetus to say...">Hello! I'm Cleetus, and I can talk now!</textarea>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="generate-btn">Generate</button>
        <button class="btn" id="stop-btn" disabled>Stop</button>
      </div>
      <button class="btn btn-block" id="download-btn" disabled>Download Audio</button>
      <button class="btn btn-block" id="replay-btn" disabled>Replay Last</button>
      <div id="status">Ready</div>
      <div id="timing"></div>
      <div class="footnote">
        // controls<br>
        Drag to rotate · Scroll to zoom · Right-drag to pan
      </div>
    </div>
  </div>
  <script type="module" src="/client.js"></script>
</body>
</html>
